  <line x1="1" y1="16" x2="31" y2="16" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" />
  <!-- the shuttle: a pointed loom boat -->
  <path d="M4 16 C 9 9, 23 9, 28 16 C 23 23, 9 23, 4 16 Z" fill="#0f766e" stroke="#0b524d" stroke-width="1" />
